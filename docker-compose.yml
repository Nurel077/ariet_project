version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: backend
    ports:
      - '4000:4000'
    environment:
      - MONGO_URL=mongodb://mongodb:27017/food-delivery
      # Add other environment variables from backend/.env if necessary
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend

  admin:
    build: ./admin
    container_name: admin
    ports:
      - '5174:5174'
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  mongodb_data:
