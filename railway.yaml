# Railway Deployment Configuration
# Явно указываем использовать Docker для каждого сервиса

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
    port: 4000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    port: 5173

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
    port: 5174
